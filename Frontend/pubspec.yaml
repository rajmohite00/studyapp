name: study_coach_app
description: AI Study Coach - Personalized Learning Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.0

  # HTTP Client
  dio: ^5.4.3+1

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Charts
  fl_chart: ^0.67.0

  # Firebase (Push Notifications)
  firebase_core: ^2.30.1
  firebase_messaging: ^14.9.1

  # UI Utilities
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  google_fonts: ^8.0.2

  # Utils
  uuid: ^4.3.3
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
